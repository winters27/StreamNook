id          = "app.streamnook.chat-logger"
name        = "Chat Logger"
version     = "0.1.0"
author      = "StreamNook"
tier        = "A"
description = "Saves chat to plain text log files: one folder per channel, one file per day."
homepage    = "https://github.com/StreamNook/streamnook-plugins"
host_min    = "7.0.0"

[runtime]
kind      = "process"
entry     = "target/release/chat-logger.exe"
args      = []
transport = "stdio"

[capabilities]
events       = ["on_chat_message", "on_panel_change"]
host_methods = ["log", "register_panel", "get_panel_values"]
ui           = ["panel"]
