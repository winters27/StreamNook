id          = "community.drops-farmer"
name        = "Drops and Points Farmer"
version     = "0.1.0"
author      = "community"
tier        = "C"
description = "Background channel-points farming and drops mining, kept out of the core app as an opt-in add-on."
homepage    = "https://github.com/winters27/StreamNook"
host_min    = "7.0.0"

[runtime]
kind      = "process"
entry     = "target/release/drops-farmer.exe"
args      = []
transport = "stdio"

[capabilities]
events       = ["on_followed_live", "on_watch_tick"]
host_methods = ["notify", "log"]
credentials  = ["twitch.android"]
network      = "external"

# Hooks this plugin fills. The app's Drops center exposes these; this plugin
# handles the mine/stop/configure actions, pushes live status, and provides
# the mining feature so the app drives it through its own native UI.
[contributes]
actions  = ["drops.mine", "drops.mine-auto", "drops.mine-all", "drops.stop", "drops.configure"]
status   = ["drops.status"]
provides = ["drops.mining"]
