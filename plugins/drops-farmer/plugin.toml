id          = "community.drops-farmer"
name        = "Autopilot"
version     = "0.1.0"
author      = "StreamNook"
tier        = "C"
description = "Earn Twitch drops and channel points in the background, without keeping a stream open."
homepage    = "https://github.com/StreamNook/streamnook-plugins"
host_min    = "7.0.0"

[runtime]
kind      = "process"
entry     = "target/release/drops-farmer.exe"
args      = []
transport = "stdio"

[capabilities]
events       = ["on_followed_live", "on_watch_tick", "on_panel_change"]
host_methods = ["notify", "log", "register_panel", "get_panel_values"]
credentials  = ["twitch.android"]
network      = "external"
ui           = ["panel"]

# Hooks this plugin fills. The app's Drops center fires these mine actions and
# shows the status this plugin pushes; settings are a rich host-rendered panel
# built from generic field types. The host never names this plugin.
[contributes]
actions  = ["drops.mine", "drops.mine-auto", "drops.mine-all", "drops.stop"]
status   = ["drops.status"]
provides = ["drops.mining"]
