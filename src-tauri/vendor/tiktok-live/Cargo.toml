# Vendored from piratetok-live-rs 0.2.0 (https://github.com/PirateTok/live-rs,
# license 0BSD). Kept as an in-tree path dependency so StreamNook owns the source
# and pins the transport stack to the SAME versions the main crate uses
# (tokio-tungstenite 0.27, reqwest 0.12) — cargo then unifies them and compiles
# no duplicate WebSocket/HTTP layer. The TikTok adapter (services/providers/tiktok.rs)
# wraps this into the ChatProvider trait.
[package]
name = "tiktok-live"
version = "0.2.0"
edition = "2021"
description = "TikTok LIVE webcast connector (vendored): chat, gifts, likes, follows, shares. ttwid-only, no signing service."
license = "0BSD"

[dependencies]
prost = "0.14"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "sync", "time", "signal"] }
# Matches StreamNook's tokio-tungstenite so cargo builds one WebSocket stack, not two.
tokio-tungstenite = { version = "0.27", features = ["native-tls"] }
reqwest = { version = "0.12", features = ["json", "gzip"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
tracing = "0.1"
flate2 = "1"
urlencoding = "2"
base64 = "0.22"
rand = "0.9"
http = "1"
futures-util = "0.3"
