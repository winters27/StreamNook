name: Build & Release Bundle

on:
  push:
    branches: [dev]
    paths:
      - "src-tauri/Cargo.toml" # Triggered by version bump
  workflow_dispatch:
    inputs:
      skip_build:
        description: "Skip build and use exe from previous release (for dependency-only updates)"
        required: false
        default: false
        type: boolean

env:
  CARGO_TERM_COLOR: always

jobs:
  merge-to-main:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge dev to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin
          # Force-push dev to main (dev is source of truth)
          git push origin origin/dev:main --force

  build:
    needs: merge-to-main
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Get version from Cargo.toml
        id: version
        shell: pwsh
        run: |
          $cargo = Get-Content src-tauri/Cargo.toml -Raw
          if ($cargo -match 'version\s*=\s*"([^"]+)"') {
            $version = $matches[1]
            echo "VERSION=$version" >> $env:GITHUB_OUTPUT
            echo "Found version: $version"
          } else {
            echo "Could not find version in Cargo.toml"
            exit 1
          }

      - name: Check if release already exists
        id: check_release
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          $releases = gh release list --limit 100 --json tagName | ConvertFrom-Json
          $exists = $releases | Where-Object { $_.tagName -eq "v$version" }
          if ($exists) {
            echo "RELEASE_EXISTS=true" >> $env:GITHUB_OUTPUT
            echo "Release v$version already exists, skipping..."
          } else {
            echo "RELEASE_EXISTS=false" >> $env:GITHUB_OUTPUT
            echo "Release v$version does not exist, will create"
          }
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        if: steps.check_release.outputs.RELEASE_EXISTS == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Rust
        if: steps.check_release.outputs.RELEASE_EXISTS == 'false'
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        if: steps.check_release.outputs.RELEASE_EXISTS == 'false'
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
          cache-on-failure: true
          shared-key: "rust-build"

      - name: Install dependencies
        if: steps.check_release.outputs.RELEASE_EXISTS == 'false'
        run: npm ci

      - name: Build Analytics Dashboard
        if: steps.check_release.outputs.RELEASE_EXISTS == 'false' && inputs.skip_build != 'true'
        shell: pwsh
        run: |
          echo "Building analytics dashboard..."
          cd analytics-dashboard
          npm ci
          npm run build
          cd ..
          echo "Analytics dashboard built to analytics-dashboard/dist"
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Install Tauri CLI (cached)
        if: steps.check_release.outputs.RELEASE_EXISTS == 'false'
        shell: pwsh
        run: |
          # Check if tauri-cli is already installed
          $tauriVersion = npm list @tauri-apps/cli 2>$null
          if ($tauriVersion) {
            echo "Tauri CLI already installed"
          } else {
            echo "Installing Tauri CLI..."
            npm install @tauri-apps/cli
          }

      - name: Pre-install WiX Toolset
        if: steps.check_release.outputs.RELEASE_EXISTS == 'false'
        shell: pwsh
        run: |
          # Pre-download WiX to avoid timeout during Tauri build
          $wixDir = "$env:LOCALAPPDATA\tauri\WixTools"

          if (Test-Path $wixDir) {
            echo "WiX Toolset already cached"
          } else {
            echo "Downloading WiX Toolset..."
            New-Item -ItemType Directory -Force -Path $wixDir | Out-Null
            
            # Download with retry and increased timeout
            $wixUrl = "https://github.com/wixtoolset/wix3/releases/download/wix3141rtm/wix314-binaries.zip"
            $wixZip = "$env:TEMP\wix314-binaries.zip"
            
            $webClient = New-Object System.Net.WebClient
            $retries = 3
            $success = $false
            
            for ($i = 1; $i -le $retries; $i++) {
              try {
                echo "Download attempt $i of $retries..."
                $webClient.DownloadFile($wixUrl, $wixZip)
                $success = $true
                break
              } catch {
                echo "Attempt $i failed: $_"
                if ($i -lt $retries) {
                  Start-Sleep -Seconds 5
                }
              }
            }
            
            if (-not $success) {
              echo "Failed to download WiX after $retries attempts"
              exit 1
            }
            
            echo "Extracting WiX Toolset..."
            Expand-Archive -Path $wixZip -DestinationPath $wixDir -Force
            Remove-Item $wixZip -Force
            
            echo "WiX Toolset installed to: $wixDir"
          }

          # Verify WiX installation
          if (Test-Path "$wixDir\candle.exe") {
            echo "WiX Toolset verified successfully"
          } else {
            echo "WiX Toolset verification failed"
            exit 1
          }

      - name: Build Tauri app
        if: steps.check_release.outputs.RELEASE_EXISTS == 'false' && inputs.skip_build != 'true'
        shell: pwsh
        run: npm run tauri build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_ADMIN_USER_ID: ${{ secrets.VITE_ADMIN_USER_ID }}
          TWITCH_APP_CLIENT_ID: ${{ secrets.TWITCH_CLIENT_ID }}
          TWITCH_APP_CLIENT_SECRET: ${{ secrets.TWITCH_CLIENT_SECRET }}
          TWITCH_ANDROID_CLIENT_ID: "kd1unb4b3q4t58fwlpcbzcbnm76a8fp"
          TWITCH_WEB_CLIENT_ID: "kimne78kx3ncx6brgo4mv6wki5h1ko"
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

      - name: Download StreamNook.exe from previous release (skip_build mode)
        if: steps.check_release.outputs.RELEASE_EXISTS == 'false' && inputs.skip_build == 'true'
        shell: pwsh
        run: |
          # Get the latest release
          $latestRelease = gh release view --json assets,tagName | ConvertFrom-Json
          echo "Latest release: $($latestRelease.tagName)"

          # Find the exe or bundle
          $exeAsset = $latestRelease.assets | Where-Object { $_.name -like "*.exe" -or $_.name -eq "StreamNook.7z" }
          if ($exeAsset) {
            echo "Downloading: $($exeAsset.name)"
            gh release download $latestRelease.tagName -p $exeAsset.name -D ./previous-release
          } else {
            echo "No exe found in previous release"
            exit 1
          }
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Copy StreamNook.exe to bundle
        if: steps.check_release.outputs.RELEASE_EXISTS == 'false'
        shell: pwsh
        run: |
          # The bundle dir used to be created by the Streamlink download step.
          New-Item -ItemType Directory -Force -Path ./bundle | Out-Null
          if ("${{ inputs.skip_build }}" -eq "true") {
            # Use exe from previous release
            $exe = Get-ChildItem ./previous-release -Filter "*.exe" | Select-Object -First 1
            if ($exe) {
              Copy-Item $exe.FullName ./bundle/StreamNook.exe
            } else {
              # Extract from previous bundle
              $bundle = Get-ChildItem ./previous-release -Filter "StreamNook.7z" | Select-Object -First 1
              if ($bundle) {
                7z x $bundle.FullName -o"./previous-release/extracted"
                Copy-Item ./previous-release/extracted/StreamNook.exe ./bundle/
              }
            }
          } else {
            # Use freshly built exe
            Copy-Item src-tauri/target/release/StreamNook.exe ./bundle/
          }
          echo "StreamNook.exe copied to bundle"

      - name: Copy CHANGELOG.md to bundle
        if: steps.check_release.outputs.RELEASE_EXISTS == 'false'
        shell: pwsh
        run: |
          Copy-Item CHANGELOG.md ./bundle/
          echo "CHANGELOG.md copied to bundle"
          # Note: Analytics dashboard is now embedded directly in the exe via rust-embed
          # No separate resources folder needed

      - name: Generate components.json
        if: steps.check_release.outputs.RELEASE_EXISTS == 'false'
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          # Streamlink/TTV-LOL are no longer bundled. Keep the (now empty) fields
          # so the components.json schema still parses on any client.
          $streamlinkVersion = ""
          $ttvlolVersion = ""
          $buildDate = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")

          $components = @{
            schema_version = 1
            streamnook = @{
              version = $version
              build_date = $buildDate
            }
            components = @{
              streamlink = @{
                version = $streamlinkVersion
                source_url = "https://github.com/streamlink/windows-builds/releases"
              }
              ttvlol = @{
                version = $ttvlolVersion
                source_url = "https://github.com/2bc4/streamlink-ttvlol/releases"
              }
            }
          }

          $json = $components | ConvertTo-Json -Depth 10
          $json | Out-File -FilePath ./bundle/components.json -Encoding utf8
          echo "components.json created:"
          echo $json

      - name: Create 7z bundle
        if: steps.check_release.outputs.RELEASE_EXISTS == 'false'
        shell: pwsh
        run: |
          $bundleName = "StreamNook.7z"

          # Create 7z archive (exe only). components.json is uploaded as a
          # separate top-level asset for older clients' version check; the new
          # updater reads the binary's own compiled-in version instead.
          cd bundle
          7z a -t7z -mx=9 "../$bundleName" StreamNook.exe
          cd ..

          echo "BUNDLE_NAME=$bundleName" >> $env:GITHUB_OUTPUT
          echo "Created: $bundleName"

          # Show bundle size
          $size = (Get-Item $bundleName).Length / 1MB
          echo "Bundle size: $([math]::Round($size, 2)) MB"
        id: bundle

      - name: Generate checksums
        if: steps.check_release.outputs.RELEASE_EXISTS == 'false'
        shell: pwsh
        run: |
          $bundleName = "${{ steps.bundle.outputs.BUNDLE_NAME }}"
          $hash = (Get-FileHash $bundleName -Algorithm SHA256).Hash
          "$hash  $bundleName" | Out-File -FilePath checksums.txt -Encoding utf8
          echo "Checksums generated:"
          Get-Content checksums.txt

      - name: Extract changelog for this version
        if: steps.check_release.outputs.RELEASE_EXISTS == 'false'
        id: changelog
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          $changelog = Get-Content CHANGELOG.md -Raw

          # Try to extract section for this version
          $pattern = "(?s)## \[?$version\]?.*?(?=## \[|\z)"
          if ($changelog -match $pattern) {
            $section = $matches[0].Trim()
            # Write to temp file for use in release step
            $section | Out-File -FilePath ./changelog_section.md -Encoding utf8
            echo "Found changelog section for v$version"
          } else {
            "Release v$version" | Out-File -FilePath ./changelog_section.md -Encoding utf8
            echo "No changelog section found, using default"
          }

      - name: Create GitHub Release
        if: steps.check_release.outputs.RELEASE_EXISTS == 'false'
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          $bundleName = "${{ steps.bundle.outputs.BUNDLE_NAME }}"

          # Read changelog section from temp file
          $changelogSection = Get-Content ./changelog_section.md -Raw

          # Build the install instructions section
          $lines = @()
          $lines += ""
          $lines += "---"
          $lines += ""
          $lines += "### Installation"
          $lines += "1. Download ``$bundleName``"
          $lines += "2. Extract the .7z file"
          $lines += "3. Run ``StreamNook.exe``"

          $componentInfo = $lines -join "`n"
          $notes = $changelogSection + $componentInfo

          # Write to file for gh release
          $notes | Out-File -FilePath ./release_notes.md -Encoding utf8

          gh release create "v$version" --title "StreamNook v$version" --notes-file ./release_notes.md "$bundleName" "bundle/components.json" "checksums.txt"

          echo "Release v$version created!"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push installer to Cloudflare R2
        # Mirrors StreamNook.7z to the R2 bucket that streamnook.app serves at
        # /download, so the website's download button always hands out this
        # build with no GitHub redirect. Requires two repo secrets:
        #   CLOUDFLARE_API_TOKEN  - token with "Workers R2 Storage: Edit"
        #   CLOUDFLARE_ACCOUNT_ID - the Cloudflare account id
        # If those secrets are absent the step is skipped (release still succeeds).
        if: steps.check_release.outputs.RELEASE_EXISTS == 'false' && env.CLOUDFLARE_API_TOKEN != ''
        shell: pwsh
        run: |
          $bundleName = "${{ steps.bundle.outputs.BUNDLE_NAME }}"
          $version = "${{ steps.version.outputs.VERSION }}"
          Write-Host "Uploading $bundleName (v$version) to R2 bucket streamnook-downloads..."
          npx --yes wrangler@4 r2 object put "streamnook-downloads/StreamNook.7z" `
            --file="$bundleName" `
            --content-type="application/x-7z-compressed" `
            --remote
          if ($LASTEXITCODE -ne 0) { throw "wrangler r2 upload failed (exit $LASTEXITCODE)" }
          Write-Host "Uploaded StreamNook.7z (v$version) to R2 - live at https://streamnook.app/download"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Notify Discord
        if: steps.check_release.outputs.RELEASE_EXISTS == 'false' && env.DISCORD_RELEASE_WEBHOOK_URL != ''
        shell: pwsh
        env:
          DISCORD_RELEASE_WEBHOOK_URL: ${{ secrets.DISCORD_RELEASE_WEBHOOK_URL }}
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          $bundleName = "${{ steps.bundle.outputs.BUNDLE_NAME }}"
          $streamlinkVersion = "${{ steps.streamlink.outputs.STREAMLINK_VERSION }}"
          $ttvlolVersion = "${{ steps.ttvlol.outputs.TTVLOL_VERSION }}"
          $releaseUrl = "https://github.com/winters27/StreamNook/releases/tag/v$version"

          # --- Custom server emote substitution ---
          # Format: '<:name:snowflake_id>' for static, '<a:name:id>' for animated.
          # Get IDs by typing \:emote_name: in any Discord channel (Discord echoes the raw form).
          # IMPORTANT: custom emotes render in `content`, embed `description`, and embed
          # `fields[].name/value`. They do NOT render in embed `title`, `author.name`, or
          # `footer.text` (those fields show literal text). Leave a value empty to keep
          # the unicode fallback.
          $emoteMap = @{
            feature     = '<a:alert:1380653449305391104>'    # animated red exclamation
            bugfix      = '<a:check:1380653692000407572>'    # animated checkmark
            maintenance = '<:invoice:1384683220901167104>'   # document
            streamlink  = ''                                 # no matching emote yet
            ttvlol      = ''                                 # no matching emote yet
            logo        = ''                                 # thumbnail already shows the Penrose logo
            rocket      = '<:bu_tg:1380653917452632064>'     # paper airplane ("shipped")
          }

          # Use the changelog body produced earlier (without the appended Bundle Components / Installation block)
          $body = Get-Content ./changelog_section.md -Raw

          # Strip the leading "## [version] - date" header — version is already the embed title
          $body = $body -replace '(?ms)^\s*##\s*\[?\d[\d\.]*\]?.*?\r?\n', ''
          $body = $body.Trim()

          # Promote section headers from H3 (### Features) to H2 (## Features). H2 renders
          # noticeably bigger and bolder in Discord, giving stronger visual hierarchy than
          # GitHub's default H3 style. Only matches lines that start with exactly three #.
          $body = $body -replace '(?m)^###\s+', '## '

          # Add a thin separator + GitHub link at the bottom of the description using subtext
          # styling (-# prefix renders smaller and dimmer in Discord, perfect for metadata).
          $body = $body.TrimEnd() + "`n`n-# [View release on GitHub →]($releaseUrl)"

          # Replace the changelog section-marker emojis with custom server emotes when configured.
          # release_manager.ps1 generates sections using ✨ / 🐛 / 🔧 (see Brain/projects/StreamNook.md).
          # Use ConvertFromUtf32 because 🐛 / 🔧 are above U+FFFF and don't fit in a single [char].
          $featureMarker     = [char]::ConvertFromUtf32(0x2728)   # ✨
          $bugfixMarker      = [char]::ConvertFromUtf32(0x1F41B)  # 🐛
          $maintenanceMarker = [char]::ConvertFromUtf32(0x1F527)  # 🔧
          if ($emoteMap.feature)     { $body = $body.Replace($featureMarker, $emoteMap.feature) }
          if ($emoteMap.bugfix)      { $body = $body.Replace($bugfixMarker, $emoteMap.bugfix) }
          if ($emoteMap.maintenance) { $body = $body.Replace($maintenanceMarker, $emoteMap.maintenance) }

          # Discord embed description cap is 4096 chars. Leave headroom for the "read more" link.
          # Custom emote strings are ~24 chars each vs ~4 for the unicode equivalent, so the
          # post-substitution body can grow noticeably on changelogs with many bullets.
          $maxLen = 3800
          if ($body.Length -gt $maxLen) {
            $body = $body.Substring(0, $maxLen).TrimEnd() + "`n`n[Read the full changelog on GitHub]($releaseUrl)"
          }

          # Field-name prefixes for the inline bundle-component fields
          $streamlinkLabel = if ($emoteMap.streamlink) { "$($emoteMap.streamlink) Streamlink" } else { 'Streamlink' }
          $ttvlolLabel     = if ($emoteMap.ttvlol)     { "$($emoteMap.ttvlol) TTV LOL"       } else { 'TTV LOL' }

          # Optional content line above the embed — this is the one place custom emotes
          # render alongside large bold text. Stays empty (and the field is omitted) until
          # at least one of the logo/rocket emotes is configured.
          $contentParts = @()
          if ($emoteMap.logo)   { $contentParts += $emoteMap.logo }
          if ($emoteMap.rocket) { $contentParts += $emoteMap.rocket }
          $contentLine = if ($contentParts.Count -gt 0) {
            ($contentParts -join ' ') + " **StreamNook v$version is live!**"
          } else { $null }

          $payloadObj = @{
            embeds = @(@{
              title = "StreamNook v$version is out"
              url = $releaseUrl
              description = $body
              color = 9941177  # #97B1B9 StreamNook accent
              thumbnail = @{ url = "https://raw.githubusercontent.com/winters27/StreamNook/main/src-tauri/icons/icon.png" }
              fields = @(
                @{ name = $streamlinkLabel; value = $streamlinkVersion; inline = $true }
                @{ name = $ttvlolLabel;     value = $ttvlolVersion;     inline = $true }
              )
              footer = @{ text = "Download $bundleName from the release page" }
              timestamp = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
            })
          }
          if ($contentLine) { $payloadObj.content = $contentLine }
          $payload = $payloadObj | ConvertTo-Json -Depth 10 -Compress

          try {
            Invoke-RestMethod -Uri $env:DISCORD_RELEASE_WEBHOOK_URL -Method Post -ContentType 'application/json' -Body $payload | Out-Null
            echo "Discord notification sent for v$version"
          } catch {
            # Don't fail the workflow if Discord is down — release is already on GitHub.
            echo "::warning::Discord webhook post failed: $_"
          }
